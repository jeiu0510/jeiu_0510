<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캐릭터 소환 페이지</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
      color: #f6eadf;
      background:
        radial-gradient(circle at 50% 20%, rgba(160, 28, 68, 0.35), transparent 35%),
        radial-gradient(circle at 80% 80%, rgba(94, 39, 140, 0.35), transparent 40%),
        linear-gradient(135deg, #090607 0%, #180b12 45%, #080607 100%);
      overflow-x: hidden;
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand span {
      font-size: 13px;
      color: #c99f8f;
      letter-spacing: 0.18em;
    }

    .brand h1 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 500;
      letter-spacing: -0.04em;
      text-shadow: 0 0 18px rgba(255, 129, 89, 0.28);
    }

    .top-link {
      border: 1px solid rgba(237, 185, 149, 0.35);
      border-radius: 999px;
      padding: 10px 16px;
      color: #ffe0c8;
      text-decoration: none;
      background: rgba(20, 10, 12, 0.55);
      backdrop-filter: blur(8px);
      font-size: 14px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 22px;
      align-items: stretch;
    }

    .panel {
      border: 1px solid rgba(218, 154, 113, 0.28);
      background: rgba(13, 8, 10, 0.72);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      position: relative;
    }

    .summon-area {
      min-height: 640px;
      display: flex;
      flex-direction: column;
    }

    .character-visual {
      flex: 1;
      position: relative;
      min-height: 450px;
      background:
        linear-gradient(to bottom, rgba(5, 3, 4, 0.05), rgba(5, 3, 4, 0.95)),
        var(--character-image);
      background-size: cover;
      background-position: center top;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .character-visual.is-changing {
      opacity: 0.25;
      transform: scale(1.015);
    }

    .rarity {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(127, 18, 42, 0.82);
      border: 1px solid rgba(255, 199, 157, 0.4);
      color: #ffd0bb;
      font-size: 13px;
      letter-spacing: 0.14em;
    }

    .name-card {
      position: absolute;
      left: 24px;
      bottom: 28px;
      right: 24px;
    }

    .name-card .role {
      color: #ff4c73;
      font-family: Georgia, serif;
      font-size: 20px;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .name-card h2 {
      margin: 0;
      font-size: clamp(42px, 8vw, 74px);
      line-height: 0.95;
      font-weight: 700;
      color: #ffe1c4;
      text-shadow: 0 0 22px rgba(255, 126, 82, 0.55);
    }

    .name-card p {
      margin: 14px 0 0;
      max-width: 520px;
      line-height: 1.7;
      color: #e8c6b1;
      font-size: 16px;
    }

    .dialogue {
      border-top: 1px solid rgba(218, 154, 113, 0.28);
      padding: 22px 24px;
      background: linear-gradient(90deg, rgba(29, 13, 15, 0.96), rgba(15, 8, 10, 0.96));
    }

    .dialogue strong {
      display: block;
      margin-bottom: 8px;
      color: #efb37d;
      font-size: 18px;
    }

    .dialogue span {
      display: block;
      line-height: 1.7;
      color: #fff0e5;
      font-size: 17px;
    }

    .side {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
    }

    .info-box {
      border: 1px solid rgba(218, 154, 113, 0.28);
      border-radius: 22px;
      padding: 20px;
      background: rgba(30, 15, 17, 0.62);
    }

    .info-box h3 {
      margin: 0 0 12px;
      color: #efb37d;
      font-family: Georgia, serif;
      letter-spacing: 0.06em;
    }

    .info-box p {
      margin: 0;
      color: #dbc0ad;
      line-height: 1.75;
    }

    .stats {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      display: grid;
      gap: 7px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      color: #f2d5c3;
      font-size: 14px;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #7e1f30, #e25f60, #ffd0a4);
      width: var(--value);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .tag {
      padding: 8px 11px;
      border: 1px solid rgba(255, 205, 161, 0.25);
      border-radius: 999px;
      color: #ffd8bf;
      background: rgba(255, 255, 255, 0.04);
      font-size: 13px;
    }

    .summon-button {
      width: 100%;
      border: 1px solid rgba(255, 203, 161, 0.45);
      border-radius: 24px;
      padding: 22px 18px;
      color: #ffe6ce;
      background:
        radial-gradient(circle at 30% 20%, rgba(255, 143, 108, 0.45), transparent 34%),
        linear-gradient(135deg, #6b1425, #2b0d18 68%, #14070c);
      box-shadow: 0 0 30px rgba(203, 50, 79, 0.32), inset 0 0 20px rgba(255, 255, 255, 0.04);
      font-size: 30px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    .summon-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .sub-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .sub-buttons a, .sub-buttons button {
      border: 1px solid rgba(237, 185, 149, 0.3);
      border-radius: 16px;
      padding: 13px 12px;
      background: rgba(15, 8, 10, 0.7);
      color: #e8c6b1;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      font-size: 14px;
    }

    .history {
      margin-top: 22px;
    }

    .history h3 {
      margin: 0 0 12px;
      color: #efb37d;
      font-family: Georgia, serif;
    }

    .history-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 10px;
    }

    .mini-card {
      border: 1px solid rgba(218, 154, 113, 0.22);
      border-radius: 16px;
      padding: 12px;
      background: rgba(20, 10, 12, 0.65);
      color: #e8c6b1;
      font-size: 13px;
    }

    .mini-card b {
      display: block;
      color: #ffe0c8;
      margin-bottom: 3px;
    }

    @media (max-width: 860px) {
      header { align-items: flex-start; flex-direction: column; }
      .hero { grid-template-columns: 1fr; }
      .summon-area { min-height: auto; }
      .character-visual { min-height: 520px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div class="brand">
        <span>JEIU CHARACTER SUMMON</span>
        <h1>운명의 캐릭터를 소환하세요</h1>
      </div>
      <a class="top-link" href="#" target="_blank">작가 페이지 바로가기</a>
    </header>

    <section class="hero">
      <article class="panel summon-area">
        <div id="visual" class="character-visual">
          <div class="rarity" id="rarity">SSR</div>
          <div class="name-card">
            <div class="role" id="role">BOSS</div>
            <h2 id="name">주성도</h2>
            <p id="summary">웃는 얼굴로 다가와 도망칠 수 없는 애정을 속삭이는 집착형 보스.</p>
          </div>
        </div>
        <div class="dialogue">
          <strong id="speaker">주성도</strong>
          <span id="quote">“드디어 내 앞에 무릎 꿇었네. 이제 네 숨결까지 전부 내 것이야.”</span>
        </div>
      </article>

      <aside class="panel side">
        <div>
          <div class="info-box">
            <h3>CHARACTER INFO</h3>
            <p id="description">치명적인 다정함과 위험한 소유욕을 동시에 가진 캐릭터. 선택지를 잘못 고르면 빠져나오기 어려운 루트로 진입한다.</p>
            <div class="stats">
              <div class="stat">
                <div class="stat-row"><span>위험도</span><span id="dangerText">92%</span></div>
                <div class="bar"><i id="dangerBar" style="--value: 92%"></i></div>
              </div>
              <div class="stat">
                <div class="stat-row"><span>집착도</span><span id="obsessionText">98%</span></div>
                <div class="bar"><i id="obsessionBar" style="--value: 98%"></i></div>
              </div>
              <div class="stat">
                <div class="stat-row"><span>다정함</span><span id="sweetText">76%</span></div>
                <div class="bar"><i id="sweetBar" style="--value: 76%"></i></div>
              </div>
            </div>
            <div class="tags" id="tags"></div>
          </div>

          <div class="history">
            <h3>소환 기록</h3>
            <div class="history-list" id="historyList"></div>
          </div>
        </div>

        <div>
          <button class="summon-button" id="summonBtn">뽑기</button>
          <div class="sub-buttons">
            <a id="chatLink" href="#" target="_blank">채팅하러 가기</a>
            <button id="shareBtn">결과 복사</button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const characters = [
      {
        name: '주성도',
        role: 'BOSS',
        rarity: 'SSR',
        summary: '웃는 얼굴로 다가와 도망칠 수 없는 애정을 속삭이는 집착형 보스.',
        description: '치명적인 다정함과 위험한 소유욕을 동시에 가진 캐릭터. 선택지를 잘못 고르면 빠져나오기 어려운 루트로 진입한다.',
        quote: '“드디어 내 앞에 무릎 꿇었네. 이제 네 숨결까지 전부 내 것이야.”',
        image: 'https://images.unsplash.com/photo-1518709268805-4e9042af2176?auto=format&fit=crop&w=1400&q=80',
        danger: 92,
        obsession: 98,
        sweet: 76,
        tags: ['집착', '다크로맨스', '보스전', '위험한 다정함'],
        link: '#'
      },
      {
        name: '오르카',
        role: 'PLAYER',
        rarity: 'SR',
        summary: '상처를 숨긴 채 끝까지 버티는 생존형 주인공.',
        description: '차분해 보이지만 내면에는 쉽게 꺾이지 않는 고집과 생존 본능을 지닌 캐릭터. 관계가 깊어질수록 숨겨진 감정선이 드러난다.',
        quote: '“도망치지 않아. 하지만 네 뜻대로 무너지지도 않을 거야.”',
        image: 'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1400&q=80',
        danger: 48,
        obsession: 61,
        sweet: 84,
        tags: ['생존', '상처', '느린 감정선', '로맨스'],
        link: '#'
      },
      {
        name: '아르덴',
        role: 'KNIGHT',
        rarity: 'SSR',
        summary: '충성이라는 이름으로 모든 선을 넘는 기사.',
        description: '명예롭고 단정한 태도 뒤에 강렬한 소유욕을 감춘 기사형 캐릭터. 보호와 감금의 경계가 매우 흐릿하다.',
        quote: '“당신을 지키기 위해서라면, 당신의 자유마저 제가 거두겠습니다.”',
        image: 'https://images.unsplash.com/photo-1519074069444-1ba4fff66d16?auto=format&fit=crop&w=1400&q=80',
        danger: 81,
        obsession: 91,
        sweet: 69,
        tags: ['기사', '충성', '보호집착', '판타지'],
        link: '#'
      }
    ];

    const $ = (id) => document.getElementById(id);
    const history = [];
    let current = characters[0];

    function pickCharacter() {
      const index = Math.floor(Math.random() * characters.length);
      return characters[index];
    }

    function render(character) {
      current = character;
      const visual = $('visual');
      visual.classList.add('is-changing');

      setTimeout(() => {
        visual.style.setProperty('--character-image', `url('${character.image}')`);
        $('rarity').textContent = character.rarity;
        $('role').textContent = character.role;
        $('name').textContent = character.name;
        $('summary').textContent = character.summary;
        $('speaker').textContent = character.name;
        $('quote').textContent = character.quote;
        $('description').textContent = character.description;
        $('dangerText').textContent = character.danger + '%';
        $('dangerBar').style.setProperty('--value', character.danger + '%');
        $('obsessionText').textContent = character.obsession + '%';
        $('obsessionBar').style.setProperty('--value', character.obsession + '%');
        $('sweetText').textContent = character.sweet + '%';
        $('sweetBar').style.setProperty('--value', character.sweet + '%');
        $('chatLink').href = character.link;

        $('tags').innerHTML = character.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

        history.unshift(character);
        if (history.length > 6) history.pop();
        $('historyList').innerHTML = history.map(item => `
          <div class="mini-card">
            <b>${item.name}</b>
            <span>${item.rarity} · ${item.role}</span>
          </div>
        `).join('');

        visual.classList.remove('is-changing');
      }, 180);
    }

    $('summonBtn').addEventListener('click', () => {
      render(pickCharacter());
    });

    $('shareBtn').addEventListener('click', async () => {
      const text = `나는 ${current.name}(${current.rarity})을/를 소환했다! ${current.summary}`;
      try {
        await navigator.clipboard.writeText(text);
        $('shareBtn').textContent = '복사 완료!';
        setTimeout(() => $('shareBtn').textContent = '결과 복사', 1200);
      } catch {
        alert(text);
      }
    });

    render(characters[0]);
  </script>
</body>
</html>
